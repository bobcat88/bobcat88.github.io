<!DOCTYPE html><html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Johan Proust — CV (F · Split Banner)</title>
<link rel="stylesheet" href="base.css">
<style>
:root{ --ink:#211e29; --muted:#635d73; --accent:#7c3aed; --accent2:#5b21b6; --lav:#f1ebfc; --rule:#e6def7; }
.top{ background:#fff; display:flex; align-items:center; gap:9pt; padding:11mm 14mm 8mm; border-bottom:1px solid var(--rule); }
.mono{ width:20mm; height:20mm; border-radius:14px; background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#fff;
  display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15pt; box-shadow:0 4px 10px rgba(124,58,237,.25); }
.top h1{ font-size:23pt; font-weight:800; color:var(--accent2); line-height:1; }
.top .title{ font-size:10pt; font-weight:600; color:var(--accent); margin-top:3pt; }
.top .brand{ font-size:8.8pt; font-style:italic; color:var(--muted); margin-top:3pt; }
.grid{ display:grid; grid-template-columns:60mm 1fr; }
.rail{ background:var(--lav); padding:10mm 9mm; }
.rail h3{ font-size:8.6pt; text-transform:uppercase; letter-spacing:1.1px; color:var(--accent2); margin:10pt 0 4pt; } .rail h3:first-child{ margin-top:0; }
.rail .kv{ font-size:8.6pt; margin-bottom:2.5pt; line-height:1.3; } .rail a{ color:var(--accent2); text-decoration:none; }
.facts{ display:grid; grid-template-columns:1fr 1fr; gap:5pt; margin-bottom:4pt; }
.fact{ background:#fff; border-radius:7px; padding:5pt; text-align:center; } .fact b{ display:block; color:var(--accent2); font-size:11pt; } .fact span{ font-size:7.2pt; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
.sk{ font-size:8.5pt; padding-left:9pt; position:relative; margin-bottom:1.8pt; } .sk::before{ content:""; position:absolute; left:0; top:4pt; width:3.5pt; height:3.5pt; border-radius:50%; background:var(--accent); }
.main{ padding:10mm 13mm; }
h2{ font-size:9.6pt; text-transform:uppercase; letter-spacing:.9px; color:var(--accent); margin:0 0 6pt; border-bottom:2px solid var(--rule); padding-bottom:2pt; }
.section{ margin-bottom:11pt; }
.metrics{ display:grid; grid-template-columns:1fr 1fr; gap:4pt 7pt; }
.metric{ border-left:2.5px solid var(--accent); background:var(--lav); padding:3.5pt 7pt; font-size:8.5pt; border-radius:0 4px 4px 0; } .metric b{ color:var(--accent2); }
.exp{ margin-bottom:7pt; page-break-inside:avoid; }
.exp-head{ display:flex; justify-content:space-between; align-items:baseline; gap:8pt; }
.exp-role b{ color:var(--accent2); } .exp-meta{ font-size:8.1pt; color:var(--muted); white-space:nowrap; }
.exp ul{ list-style:none; margin-top:2.5pt; } .exp li{ position:relative; padding-left:10pt; margin-bottom:1.4pt; font-size:8.9pt; }
.exp li::before{ content:"▸"; position:absolute; left:0; color:var(--accent); font-size:7pt; top:1.5pt; }
</style></head><body>
<div class="toolbar no-print"><a href="gallery2.html">← Gallery</a><button onclick="print()">Print / PDF</button></div>
<main class="page">
  <div class="top"><div class="mono" id="mono"></div><div><h1 id="name"></h1><div class="title" id="title"></div><div class="brand" id="brand"></div></div></div>
  <div class="grid">
    <aside class="rail">
      <h3>En bref</h3><div class="facts" id="facts"></div>
      <h3>Contact</h3><div id="contact"></div>
      <h3>Compétences</h3><div id="skills"></div>
      <h3>Formation</h3><div id="edu"></div>
      <h3>Langues</h3><div id="lang"></div>
    </aside>
    <section class="main">
      <div class="section"><h2>Profil</h2><p id="summary"></p></div>
      <div class="section"><h2>Résultats clés</h2><div class="metrics" id="metrics"></div></div>
      <div class="section"><h2>Expérience</h2><div id="exp"></div></div>
    </section>
  </div>
</main>
<script src="data.js"></script>
<script>
const d=window.CV_DATA, $=id=>document.getElementById(id);
$("mono").textContent=d.monogram; $("name").textContent=d.name; $("title").textContent=d.title; $("brand").textContent="« "+d.brand+" »"; $("summary").textContent=d.summary;
$("facts").innerHTML=d.facts.map(([v,l])=>`<div class="fact"><b>${v}</b><span>${l}</span></div>`).join("");
$("contact").innerHTML=d.contact.map(([k,t,h])=>`<div class="kv">${h?`<a href="${h}">${t}</a>`:t}</div>`).join("");
$("skills").innerHTML=d.skillsFlat.map(s=>`<div class="sk">${s}</div>`).join("");
$("edu").innerHTML=d.education.map(([y,t,s])=>`<div class="kv"><b style="color:var(--accent2)">${y}</b> ${t}${s?" · "+s:""}</div>`).join("");
$("lang").innerHTML=d.languages.map(([l,v])=>`<div class="kv">${l} — ${v}</div>`).join("");
$("metrics").innerHTML=d.metrics.map(([v,l,c])=>`<div class="metric"><b>${v}</b> — ${l} <span style="color:var(--muted)">(${c})</span></div>`).join("");
$("exp").innerHTML=d.experience.map(([r,o,dt,loc,b])=>`<div class="exp"><div class="exp-head"><div class="exp-role"><b>${r}</b> — ${o}</div><div class="exp-meta">${dt} · ${loc}</div></div><ul>${b.map(x=>`<li>${x}</li>`).join("")}</ul></div>`).join("");
</script></body></html>
