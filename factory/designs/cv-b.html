<!DOCTYPE html><html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Johan Proust — CV (B · Plum Sidebar)</title>
<link rel="stylesheet" href="base.css">
<style>
:root{
  --ink:#1c1b22; --muted:#5b6573;
  --accent:#6d28d9; --plum:#4c1d95; --plum2:#6d28d9;  /* unified mauve (matches Dossier banner) */
  --soft:#eef0f4;        /* cool-grey cards */
  --rule:#e6def7;        /* mauve-tint — H2 underline */
  --line:#e3e6ea;        /* neutral divider */
  --slate:#334155;       /* sober accent — figures, years */
}
.grid{ display:grid; grid-template-columns:62mm 1fr; min-height:297mm; }
.side{ background:linear-gradient(180deg,var(--plum),var(--plum2)); color:#efe7fb; padding:14mm 9mm; }
.mono{ width:18mm; height:18mm; border-radius:50%; background:rgba(255,255,255,.14); border:1.5px solid rgba(255,255,255,.4);
  display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14pt; letter-spacing:.5px; margin-bottom:8pt; }
.block{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:7px; padding:4pt 8pt 4.5pt; margin-bottom:3.5pt; }
.block:last-child{ margin-bottom:0; }
.side h3{ font-size:8.2pt; text-transform:uppercase; letter-spacing:1.1px; color:#ecd6ee; margin:0 0 4pt; display:flex; align-items:center; gap:5pt; font-weight:700; }
.ico{ width:9pt; height:9pt; flex:none; stroke:#c993cf; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.ico svg{ width:100%; height:100%; display:block; }
.side .kv{ font-size:8.5pt; margin-bottom:1.8pt; line-height:1.28; } .side .kv:last-child{ margin-bottom:0; } .side a{ color:#fff; text-decoration:none; }
.side .sk{ font-size:8.4pt; margin-bottom:1.6pt; padding-left:9pt; position:relative; } .side .sk:last-child{ margin-bottom:0; }
.side .sk::before{ content:""; position:absolute; left:0; top:3.5pt; width:3.5pt; height:3.5pt; border-radius:50%; background:#c993cf; }
.main{ padding:9mm 13mm 5mm; }
.nm{ font-size:22pt; font-weight:800; color:var(--plum); line-height:1; }
.title{ font-size:10pt; font-weight:600; color:var(--accent); margin-top:3pt; }
.brand{ font-size:9.2pt; font-style:italic; color:var(--muted); margin-top:4pt; }
h2{ font-size:9.4pt; text-transform:uppercase; letter-spacing:.9px; color:var(--accent); margin:9pt 0 5pt; border-bottom:2px solid var(--rule); padding-bottom:2pt; }
.metrics{ display:grid; grid-template-columns:1fr 1fr; gap:3pt 6pt; }
.metric{ border-left:2.5px solid var(--accent); background:var(--soft); padding:3pt 6pt; font-size:8.4pt; border-radius:0 4px 4px 0; }
.metric b{ color:var(--slate); }
.exp{ margin-bottom:5pt; page-break-inside:avoid; }
.exp-head{ display:flex; justify-content:space-between; align-items:baseline; gap:8pt; }
.exp-role b{ color:var(--ink); } .exp-meta{ font-size:8.2pt; font-weight:600; color:var(--ink); white-space:nowrap; }
.exp ul{ list-style:none; margin-top:2pt; } .exp li{ position:relative; padding-left:10pt; margin-bottom:1pt; font-size:8.9pt; line-height:1.34; }
.exp li::before{ content:"▸"; position:absolute; left:0; color:var(--accent); font-size:7pt; top:1.5pt; }
</style></head><body>
<div class="toolbar no-print"><a href="gallery2.html">← Gallery</a><button onclick="print()">Print / PDF</button></div>
<main class="page"><div class="grid">
  <aside class="side">
    <div style="text-align: center; margin-bottom: 12pt;">
      <img id="photo" src="" alt="Johan Proust" style="width: 25mm; height: 25mm; border-radius: 50%; border: 1.5px solid rgba(255,255,255,.3); object-fit: cover; display: none; margin: 0 auto;">
      <div class="mono" id="mono" style="margin: 0 auto;"></div>
    </div>
    <div class="block"><h3><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></span>Contact</h3><div id="contact"></div></div>
    <div id="skillGroups"></div>
    <div class="block"><h3><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m4 7 8-4 8 4-8 4-8-4Z"/><path d="M6 10v5c2 2 10 2 12 0v-5"/></svg></span>Formation</h3><div id="edu"></div></div>
    <div class="block"><h3><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/></svg></span>Langues</h3><div id="lang"></div></div>
  </aside>
  <section class="main">
    <div class="nm" id="name"></div><div class="title" id="title"></div><div class="brand" id="brand"></div>
    <h2>Profil</h2><p id="summary"></p>
    <h2>Résultats clés</h2><div class="metrics" id="metrics"></div>
    <h2>Expérience</h2><div id="exp"></div>
  </section>
</div></main>
<script src="data.js?b=1"></script>
<script>
const d=window.CV_DATA, $=id=>document.getElementById(id);
const icons={
  gouvernance:'<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 19h16"/><path d="M7 19V9l5-4 5 4v10"/><path d="M9 13h6"/></svg></span>',
  product:'<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 7h16v10H4z"/><path d="M8 21h8M12 17v4"/></svg></span>',
  tech:'<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m8 9-4 3 4 3M16 9l4 3-4 3M14 5l-4 14"/></svg></span>',
  leadership:'<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M16 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM8 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M2 21a6 6 0 0 1 12 0M12 20a6 6 0 0 1 10 1"/></svg></span>',
  default:'<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3v18M3 12h18"/></svg></span>'
};
const iconFor=g=>{const s=g.toLowerCase();return s.includes("gouvernance")||s.includes("pilotage")?icons.gouvernance:s.includes("product")||s.includes("agile")?icons.product:s.includes("tech")||s.includes("ai")?icons.tech:s.includes("leadership")?icons.leadership:icons.default;};
if (d.photo) {
  $("photo").src = d.photo;
  $("photo").style.display = "block";
  $("mono").style.display = "none";
} else {
  $("mono").textContent = d.monogram;
}
$("name").textContent=d.name; $("title").textContent=d.title; $("brand").textContent="« "+d.brand+" »";
$("contact").innerHTML=d.contact.map(([k,t,h])=>`<div class="kv">${h?`<a href="${h}">${t}</a>`:t}</div>`).join("");
$("skillGroups").innerHTML=d.skillGroups.map(([g,arr])=>`<div class="block"><h3>${iconFor(g)}${g}</h3>`+arr.map(s=>`<div class="sk">${s}</div>`).join("")+`</div>`).join("");
$("edu").innerHTML=d.education.map(([y,t,s])=>`<div class="kv"><b style="color:#cdaed0">${y}</b> ${t}${s?" · "+s:""}</div>`).join("");
$("lang").innerHTML=d.languages.map(([l,v])=>`<div class="kv">${l} — ${v}</div>`).join("");
$("summary").textContent=d.summary;
$("metrics").innerHTML=d.metrics.map(([v,l,c])=>`<div class="metric"><b>${v}</b> — ${l} <span style="color:var(--muted)">(${c})</span></div>`).join("");
// fit 1 page: Arkéa full(3); Thales & EPSI →2; older roles →1
$("exp").innerHTML=d.experience.map(([r,o,dt,loc,b],i)=>{const n=i===0?3:(i===1||i===3?2:1);const bl=b.slice(0,n);return `<div class="exp"><div class="exp-head"><div class="exp-role"><b>${r}</b> — ${o}</div><div class="exp-meta">${dt} · ${loc}</div></div><ul>${bl.map(x=>`<li>${x}</li>`).join("")}</ul></div>`;}).join("");
</script></body></html>
