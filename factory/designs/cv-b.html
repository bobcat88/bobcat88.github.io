<!DOCTYPE html><html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Johan Proust — CV (B · Plum Sidebar)</title>
<link rel="stylesheet" href="base.css">
<style>
/* Tailored offer CV — Plum Sidebar. Laid out as TWO self-contained A4 sheets so a
   2-page CV stays clean: each sheet carries its own full-height colour band and its
   own padding, so the band never fragments and page 2 keeps a proper top margin. */
:root{
  --ink:#1c1b22; --muted:#5b6573;
  --accent:#6d28d9; --plum:#4c1d95; --plum2:#6d28d9;  /* unified mauve (matches Dossier banner) */
  --soft:#eef0f4;        /* cool-grey cards */
  --rule:#e6def7;        /* mauve-tint — H2 underline */
  --line:#e3e6ea;        /* neutral divider */
  --slate:#334155;       /* sober accent — figures, years */
}
@page{ size:A4; margin:0; }

/* Each sheet is exactly one A4 page: full-bleed band + internal padding per sheet. */
.sheet{ position:relative; width:210mm; height:297mm; overflow:hidden;
  display:grid; grid-template-columns:62mm 1fr; background:#fff;
  margin:8mm auto; box-shadow:0 2px 16px rgba(0,0,0,.16); }
@media print{ .sheet{ margin:0; box-shadow:none; }
  .sheet + .sheet{ break-before:page; page-break-before:always; } }

.side{ background:linear-gradient(180deg,var(--plum),var(--plum2)); color:#efe7fb; padding:14mm 9mm; }
.mono{ width:18mm; height:18mm; border-radius:50%; background:rgba(255,255,255,.14); border:1.5px solid rgba(255,255,255,.4);
  display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14pt; letter-spacing:.5px; margin-bottom:8pt; }
.block{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:7px; padding:4pt 8pt 4.5pt; margin-bottom:3.5pt; }
.block:last-child{ margin-bottom:0; }
.side h3{ font-size:8.2pt; text-transform:uppercase; letter-spacing:1.1px; color:#ecd6ee; margin:0 0 4pt; display:flex; align-items:center; gap:5pt; font-weight:700; }
.ico{ width:9pt; height:9pt; flex:none; stroke:#c993cf; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.ico svg{ width:100%; height:100%; display:block; }
.side .kv{ font-size:8.5pt; margin-bottom:1.8pt; line-height:1.28; } .side .kv:last-child{ margin-bottom:0; } .side a{ color:#fff; text-decoration:none; }
.side .sk{ font-size:8.4pt; margin-bottom:1.6pt; padding-left:9pt; position:relative; } .side .sk:last-child{ margin-bottom:0; }
.side .sk::before{ content:""; position:absolute; left:0; top:3.5pt; width:3.5pt; height:3.5pt; border-radius:50%; background:#c993cf; }
.main{ padding:9mm 13mm 12mm 13mm; }
.nm{ font-size:22pt; font-weight:800; color:var(--plum); line-height:1; }
.title{ font-size:10pt; font-weight:600; color:var(--accent); margin-top:3pt; }
.brand{ font-size:9.2pt; font-style:italic; color:var(--muted); margin-top:4pt; }
h2{ font-size:9.4pt; text-transform:uppercase; letter-spacing:.9px; color:var(--accent); margin:9pt 0 5pt; border-bottom:2px solid var(--rule); padding-bottom:2pt; }
.main > h2:first-child{ margin-top:0; }
#summary{ font-size:8.5pt; line-height:1.34; color:var(--ink); margin-bottom:3pt; }
.metrics{ display:grid; grid-template-columns:1fr 1fr; gap:3pt 6pt; }
.metric{ border-left:2.5px solid var(--accent); background:var(--soft); padding:3pt 6pt; font-size:8.4pt; border-radius:0 4px 4px 0; }
.metric{ display:grid; grid-template-columns:13pt 1fr; gap:4pt; align-items:start; }
.metric svg{ width:11pt; height:11pt; margin-top:1pt; stroke:var(--accent); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.metric b{ color:var(--slate); }
.exp{ margin-bottom:6pt; page-break-inside:avoid; break-inside:avoid; }
.exp:last-child{ margin-bottom:0; }
.exp-head{ display:flex; justify-content:space-between; align-items:baseline; gap:8pt; }
.exp-role{ font-size:9.6pt; color:var(--muted); line-height:1.25; } .exp-role b{ font-size:10.5pt; font-weight:700; color:var(--ink); } .exp-meta{ font-size:8.4pt; font-weight:600; color:var(--slate); white-space:nowrap; }
.exp-context{ font-size:8.4pt; font-style:italic; color:var(--muted); margin-top:2pt; }
.exp ul{ list-style:none; margin-top:3pt; } .exp li{ position:relative; padding-left:10pt; margin-bottom:1.4pt; font-size:8.9pt; line-height:1.34; }
.exp li::before{ content:"▸"; position:absolute; left:0; color:var(--accent); font-size:7pt; top:1.5pt; }
.exp-stack{ display:flex; flex-wrap:wrap; gap:3pt; margin-top:4pt; }
.exp-stack .tag{ background:var(--soft); border:1px solid var(--line); color:var(--slate); border-radius:4px; padding:1.5pt 6pt; font-size:7.6pt; font-weight:600; }
.ref{ background:var(--soft); border-left:2.5px solid var(--accent); border-radius:0 4px 4px 0; padding:3pt 7pt; margin-bottom:3.5pt; page-break-inside:avoid; break-inside:avoid; }
.ref:last-child{ margin-bottom:0; }
.ref-top{ font-size:8pt; color:var(--ink); }
.ref-name{ color:var(--ink); font-weight:700; }
.ref-role{ color:var(--accent); font-weight:600; }
.ref-ct{ font-size:7.7pt; color:var(--slate); margin-top:1pt; overflow-wrap:anywhere; }
.pp-grid{ display:grid; grid-template-columns:1fr 1fr; gap:4pt; margin-bottom:5pt; }
.pp{ background:var(--soft); border-left:2.5px solid var(--accent); border-radius:0 4px 4px 0; padding:4pt 6pt; font-size:7.9pt; line-height:1.25; }
.pp b{ color:var(--ink); font-size:8.2pt; }
.pp-tags{ margin-top:2pt; color:var(--slate); font-weight:600; font-size:7.2pt; }
</style></head><body>
<div class="toolbar no-print"><a href="gallery2.html">← Gallery</a><button onclick="print()">Print / PDF</button></div>
<main>
  <section class="sheet">
    <aside class="side">
      <div style="text-align: center; margin-bottom: 12pt;">
        <img id="photo" src="" alt="Johan Proust" style="width: 25mm; height: 25mm; border-radius: 50%; border: 1.5px solid rgba(255,255,255,.3); object-fit: cover; display: none; margin: 0 auto;">
        <div class="mono" id="mono" style="margin: 0 auto;"></div>
      </div>
      <div class="block"><h3><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></span>Contact</h3><div id="contact"></div></div>
      <div id="skillGroups1"></div>
    </aside>
    <section class="main">
      <div class="nm" id="name"></div><div class="title" id="title"></div><div class="brand" id="brand"></div>
      <h2>Profil</h2><p id="summary"></p>
      <h2>Résultats clés</h2><div class="metrics" id="metrics"></div>
      <h2>Expérience</h2><div id="exp1"></div>
    </section>
  </section>
  <section class="sheet">
    <aside class="side">
      <div id="skillGroups2"></div>
      <div class="block"><h3><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m4 7 8-4 8 4-8 4-8-4Z"/><path d="M6 10v5c2 2 10 2 12 0v-5"/></svg></span>Formation</h3><div id="edu"></div></div>
      <div class="block"><h3><span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/></svg></span>Langues</h3><div id="lang"></div></div>
    </aside>
    <section class="main">
      <h2>Expérience <span style="font-weight:600;text-transform:none;letter-spacing:0;color:var(--muted)">(suite)</span></h2>
      <div id="exp2"></div>
      <section id="pp-sec" hidden><h2>Projets personnels IA / data</h2><div class="pp-grid" id="passionProjects"></div></section>
      <section id="ref-sec" hidden><h2>Références</h2><div id="referents"></div></section>
    </section>
  </section>
</main>
<script src="data.js?b=1"></script>
<script>
const d=window.CV_DATA, $=id=>document.getElementById(id);
const icons={
  gouvernance:'<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 19h16"/><path d="M7 19V9l5-4 5 4v10"/><path d="M9 13h6"/></svg></span>',
  product:'<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 7h16v10H4z"/><path d="M8 21h8M12 17v4"/></svg></span>',
  tech:'<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m8 9-4 3 4 3M16 9l4 3-4 3M14 5l-4 14"/></svg></span>',
  leadership:'<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M16 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM8 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M2 21a6 6 0 0 1 12 0M12 20a6 6 0 0 1 10 1"/></svg></span>',
  default:'<span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3v18M3 12h18"/></svg></span>'
};
const iconFor=g=>{const s=g.toLowerCase();return s.includes("gouvernance")||s.includes("pilotage")?icons.gouvernance:s.includes("product")||s.includes("agile")?icons.product:s.includes("tech")||s.includes("ai")?icons.tech:s.includes("leadership")?icons.leadership:icons.default;};
const skillBlock=([g,arr])=>`<div class="block"><h3>${iconFor(g)}${g}</h3>`+arr.map(s=>`<div class="sk">${s}</div>`).join("")+`</div>`;
const metricIcon='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19h16"/><path d="m6 15 4-4 3 3 5-7"/><path d="M18 7h-4M18 7v4"/></svg>';
const renderExp=list=>list.map(([r,o,dt,loc,b,ctx,stack])=>`<div class="exp"><div class="exp-head"><div class="exp-role"><b>${r}</b> | ${o}</div><div class="exp-meta">${dt} · ${loc}</div></div>${ctx?`<div class="exp-context">${ctx}</div>`:""}<ul>${b.map(x=>`<li>${x}</li>`).join("")}</ul>${stack&&stack.length?`<div class="exp-stack">${stack.map(s=>`<span class="tag">${s}</span>`).join("")}</div>`:""}</div>`).join("");
if (d.photo) {
  $("photo").src = d.photo;
  $("photo").style.display = "block";
  $("mono").style.display = "none";
} else {
  $("mono").textContent = d.monogram;
}
$("name").textContent=d.name; $("title").textContent=d.title; $("brand").textContent=d.ui.quoteOpen+d.brand+d.ui.quoteClose;
$("contact").innerHTML=d.contact.map(([k,t,h])=>`<div class="kv">${h?`<a href="${h}">${t}</a>`:t}</div>`).join("");
// Split sidebar skill groups across the two sheets; keep full bullet detail per role.
const sg=d.skillGroups, half=Math.ceil(sg.length/2);
$("skillGroups1").innerHTML=sg.slice(0,half).map(skillBlock).join("");
$("skillGroups2").innerHTML=sg.slice(half).map(skillBlock).join("");
$("edu").innerHTML=d.education.map(([y,t,s])=>`<div class="kv"><b style="color:#cdaed0">${y}</b> ${t}${s?" · "+s:""}</div>`).join("");
$("lang").innerHTML=d.languages.map(([l,v])=>`<div class="kv">${l} - ${v}</div>`).join("");
$("summary").textContent=d.summary;
$("metrics").innerHTML=d.metrics.map(([v,l,c])=>`<div class="metric">${metricIcon}<div><b>${v}</b>, ${l} <span style="color:var(--muted)">(${c})</span></div></div>`).join("");
// Experience flows across both sheets: 2 experiences on sheet 1 (to preserve page fit & 12mm bottom padding), remainder on sheet 2.
const ex=d.experience, exHalf=ex.length >= 5 ? 2 : Math.ceil(ex.length/2);
$("exp1").innerHTML=renderExp(ex.slice(0,exHalf));
$("exp2").innerHTML=renderExp(ex.slice(exHalf));
const pps=d.passionProjects||[];
if(pps.length){
  $("passionProjects").innerHTML=pps.map(p=>`<div class="pp"><b>${p.name}</b><br>${p.proof}${p.tags&&p.tags.length?`<div class="pp-tags">${p.tags.join(" · ")}</div>`:""}</div>`).join("");
  $("pp-sec").hidden=false;
}
// Références — present only on tailored CVs (referents come from the private offer.md).
const refs=d.referents||[];
if(refs.length){
  $("referents").innerHTML=refs.map(r=>`<div class="ref"><div class="ref-top">${r.name?`<span class="ref-name">${r.name}</span>`:""}${r.role?` | <span class="ref-role">${r.role}</span>`:""}${r.company?` | ${r.company}`:""}</div>${r.contact?`<div class="ref-ct">${r.contact}</div>`:""}</div>`).join("");
  $("ref-sec").hidden=false;
}
</script></body></html>
